<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSB深度人格映射系统</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ff7675;
            --bg: #f9f9fb;
            --text: #2d3436;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        #app {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(108, 92, 231, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* 进度条优化 */
        .progress-container {
            margin-bottom: 30px;
        }
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        #inner-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%;
            transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* 卡片动画 */
        .screen { display: none; animation: fadeIn 0.5s ease-out; }
        .active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--primary); font-size: 1.6rem; text-align: center; margin-top: 0; }
        .q-text { font-size: 1.15rem; line-height: 1.6; margin: 30px 0; min-height: 80px; font-weight: 500; }

        .btn-group { display: grid; gap: 12px; }
        .opt-btn {
            padding: 16px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            text-align: left;
            outline: none;
        }

        .opt-btn:active { background: #f0f0f0; transform: scale(0.98); }

        @media (hover: hover) {
            .opt-btn:hover {
                border-color: var(--primary);
                color: var(--primary);
                background: #fafdff;
            }
        }

        /* 结果页样式 */
        .result-card { text-align: center; }
        .type-tag { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin: 20px 0; }
        .desc-box { background: #f1f2f6; padding: 25px; border-radius: 20px; line-height: 1.8; text-align: left; font-size: 0.95rem; }
        .data-viz { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-top: 20px;
            font-size: 0.8rem;
            color: #636e72;
        }
        .data-item { background: white; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="app">
    <div id="welcome-screen" class="screen active">
        <div style="font-size: 4rem; text-align: center;">🧬</div>
        <h1>DSB 人格映射</h1>
        <p style="color: #636e72; text-align: center; line-height: 1.6;">基于 30 项潜意识行为锚点<br>解码你隐藏在“正常人”外壳下的真实成分</p>
        <div style="height: 30px;"></div>
        <button class="opt-btn" style="width: 100%; text-align: center; background: var(--primary); color: white; border: none;" onclick="initQuiz()">开始深度扫描</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span id="q-counter" style="font-size: 0.75rem; color: #b2bec3; font-weight: bold;">ANALYZING 1/30</span>
                <span id="q-percent" style="font-size: 0.75rem; color: var(--primary);">0%</span>
            </div>
            <div class="progress-bar"><div id="inner-bar"></div></div>
        </div>
        <div class="q-text" id="q-text">Loading...</div>
        <div class="btn-group">
            <button class="opt-btn" onclick="handleSelect(2)">✅ 极其符合</button>
            <button class="opt-btn" onclick="handleSelect(1)">👌 基本如此</button>
            <button class="opt-btn" onclick="handleSelect(-1)">🤔 不太像我</button>
            <button class="opt-btn" onclick="handleSelect(-2)">❌ 彻底否定</button>
        </div>
    </div>

    <div id="result-screen" class="screen result-card">
        <p style="color: #636e72; margin-bottom: 5px;">扫描完成，您的主导人格为：</p>
        <div class="type-tag" id="res-title"></div>
        <div class="desc-box" id="res-desc"></div>
        
        <div class="data-viz">
            <div class="data-item">脑洞维度: <span id="v-img">0</span></div>
            <div class="data-item">社恐抗性: <span id="v-soc">0</span></div>
            <div class="data-item">咸鱼动能: <span id="v-lazy">0</span></div>
            <div class="data-item">解构深度: <span id="v-meta">0</span></div>
        </div>

        <button class="opt-btn" style="margin-top: 30px; width: 100%; text-align: center;" onclick="location.reload()">重新映射</button>
    </div>
</div>

<script>
    // 题库与分类（0:脑洞, 1:社恐, 2:咸鱼, 3:解构/真实性）
    const bank = [
        {t: "你常在深夜通过刷短视频来缓解‘今天什么都没做’的负罪感。", c: 2},
        {t: "如果在一个全是陌生人的聚会上，你更愿意去逗猫/狗而不是和人说话。", c: 1},
        {t: "你买过昂贵的健身卡或学习课程，但由于‘心理上已经努力过了’而从未去过。", c: 2},
        {t: "面对不熟的人发来的语音消息，你会感到莫名的烦躁或压力。", c: 1},
        {t: "你曾幻想过如果突然获得超能力，第一件事是用来改善生活而不是拯救世界。", c: 0},
        {t: "你觉得比起真实的旅行，看别人的旅行 VLOG 反而让你更轻松。", c: 2},
        {t: "洗澡时，你经常会进行一些获颁诺贝尔奖或奥斯卡奖的获奖感言练习。", c: 0},
        {t: "你会为了凑够外卖起送价，而多花 15 分钟挑选一件你并不想吃的单品。", c: 1},
        {t: "你觉得‘早起’是对灵魂的一种不人道折磨。", c: 2},
        {t: "当你在路上远远看到熟人，你会立刻低下头或假装看手机以避免打招呼。", c: 1},
        {t: "你觉得自己的内心住着一个极其成熟的智者，但表现出来的像个智障。", c: 3},
        {t: "对于‘明天要早起’这件事，你的应对策略是比平时熬得更晚。", c: 2},
        {t: "你会因为一张表情包的语境不合适，而纠结是否要发给对方。", c: 1},
        {t: "你曾怀疑过自己其实是某本小说里的配角，或者被外星人监视着。", c: 0},
        {t: "你有一项坚持很久的爱好，但除了你自己，没有人知道你在搞这个。", c: 3},
        {t: "比起解决问题，你更擅长在脑内复盘如果问题解决了会有多爽。", c: 0},
        {t: "你认为‘不回消息’其实也是一种礼貌且明确的回复。", c: 1},
        {t: "当你看到有人在社交媒体上大秀恩爱，你的第一反应是‘散得快’。", c: 3},
        {t: "你觉得如果你去参加那种生存类真人秀，你绝对活不过第二集。", c: 2},
        {t: "在超市排队时，你总觉得另一队比你这队动得快，哪怕两边一样长。", c: 3},
        {t: "你偶尔会对着镜子里的自己做一个极其猥琐或夸张的表情。", c: 0},
        {t: "你买东西时会因为店员太热情而感到害怕，甚至因此放弃购买。", c: 1},
        {t: "如果世界静止一小时，你更可能先找个没人的地方瘫着而不是搞大钱。", c: 2},
        {t: "你觉得人类这种生物，本质上都是在互相‘装作很正常’地活着。", c: 3},
        {t: "你对自己未来的规划通常仅限于‘等到周末再说’。", c: 2},
        {t: "你会因为在公共场合放了一个只有自己听见的屁而尴尬半小时。", c: 1},
        {t: "你认为‘极简主义’的最好借口是因为自己懒得收拾房间。", c: 2},
        {t: "你曾经为了拒绝一个邀约，编造了一个连你自己都快相信了的借口。", c: 1},
        {t: "你觉得那些充满正能量、每天打鸡血的人，可能是某种仿生机器人。", c: 3},
        {t: "在做完这个测试后，你其实并不在乎结果，你只是想看看系统怎么编。", c: 3}
    ];

    let current = 0;
    let scores = [0, 0, 0, 0]; // 分别对应 c0, c1, c2, c3

    function initQuiz() {
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        updateQ();
    }

    function updateQ() {
        document.getElementById('q-text').innerText = bank[current].t;
        document.getElementById('q-counter').innerText = `ANALYZING ${current + 1}/30`;
        const percent = Math.round((current / 30) * 100);
        document.getElementById('q-percent').innerText = `${percent}%`;
        document.getElementById('inner-bar').style.width = `${percent}%`;
    }

    function handleSelect(val) {
        // 记录对应维度的分数
        const category = bank[current].c;
        scores[category] += val;

        current++;
        if (current < 30) {
            updateQ();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        const resScreen = document.getElementById('result-screen');
        resScreen.classList.add('active');

        // 计算结果
        const [img, soc, lazy, meta] = scores;
        const maxVal = Math.max(...scores);
        const index = scores.indexOf(maxVal);

        let title = "";
        let desc = "";

        // 根据得分最高的维度判断
        if (index === 0) {
            title = "🌌 赛博迷失哲学家";
            desc = "你的脑洞足以撑起一个平行宇宙。在现实生活中，你可能只是个普通人，但在精神世界里，你已经完成了三次星际航行。这种极高的‘脑内算力’让你经常显得心不在焉，其实你只是在忙着处理平行世界的 bug。";
        } else if (index === 1) {
            title = "🌵 荒原清醒野兽";
            desc = "你拥有一套极其灵敏的社交雷达，主要功能是‘避障’。你对人类文明的繁文缛节感到疲惫，更倾向于在自己的精神荒原里独行。这并非孤僻，而是一种高级的自我保护机制。";
        } else if (index === 2) {
            title = "🥤 碳酸饮料守护者";
            desc = "你是当代‘反内卷’的终极形态。你擅长以最低能耗维持生命体征，对你而言，所有的焦虑在‘躺平’面前都会瞬间降维。你的人格自带 0.5 倍速播放效果，稳健得令人发指。";
        } else {
            title = "🗿 现实解构主义者";
            desc = "你看穿了社会运行的各种‘潜规则’和假象。你对矫情的东西天然免疫，毒舌只是你的表象，清醒才是你的内核。你甚至在怀疑这个测试的算法，这种怀疑本身就是你人格的一部分。";
        }

        // 填充数据
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerHTML = `<strong>核心分析：</strong><br>${desc}`;
        document.getElementById('v-img').innerText = img;
        document.getElementById('v-soc').innerText = soc;
        document.getElementById('v-lazy').innerText = lazy;
        document.getElementById('v-meta').innerText = meta;
    }
</script>
</body>
</html>
